name: countrycodepicker
description: Flexible Country picker for getting Country code and Calling code.
version: 1.0.0
homepage: https://github.com/dev-naiksan/countrycodepicker.git

environment:
  sdk: '>=3.0.2 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_sim_country_code: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - flags/
    - raw/